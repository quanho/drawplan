<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DrawPlan — Vẽ mặt bằng</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --left-w: 360px;
      --header-h: 44px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #f1f5f9;
      color: #1e293b;
      height: 100vh;
      display: grid;
      grid-template-rows: var(--header-h) 1fr;
      overflow: hidden;
    }

    header {
      background: #1e3a2f;
      color: #f0fdf4;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      font-size: 15px;
      font-weight: 600;
    }
    header span { opacity: .5; font-weight: 400; font-size: 12px; }
    header a {
      margin-left: auto;
      color: #86efac;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }
    header a:hover { text-decoration: underline; }

    main {
      display: grid;
      grid-template-columns: var(--left-w) 1fr;
      overflow: hidden;
    }

    /* ── Left panel ─────────────────────────────────────── */
    #left {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #d1fae5;
      background: #fff;
      overflow: hidden;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #64748b;
      padding: 8px 12px 6px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #input {
      flex: 1;
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      padding: 10px;
      border: none;
      resize: none;
      outline: none;
      color: #1e293b;
      background: #f8fafc;
    }

    #toolbar {
      display: flex;
      gap: 8px;
      padding: 8px 10px;
      border-top: 1px solid #e2e8f0;
      background: #fff;
    }

    button {
      padding: 5px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background .15s;
    }

    #run {
      background: #16a34a;
      color: #fff;
      flex: 1;
    }
    #run:hover { background: #15803d; }

    #copy-svg {
      background: #e2e8f0;
      color: #1e293b;
    }
    #copy-svg:hover { background: #cbd5e1; }
    #copy-svg.copied { background: #dcfce7; color: #166534; }

    #export-html {
      background: #0ea5e9;
      color: #fff;
    }
    #export-html:hover { background: #0284c7; }
    #export-html.done { background: #dcfce7; color: #166534; }

    #measure {
      background: #e2e8f0;
      color: #1e293b;
    }
    #measure:hover { background: #cbd5e1; }
    #measure.active { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }

    #error-box {
      padding: 8px 10px;
      font-size: 12px;
      color: #b91c1c;
      background: #fef2f2;
      border-top: 1px solid #fecaca;
      min-height: 28px;
      max-height: 80px;
      overflow-y: auto;
    }

    /* ── Right panel — SVG canvas ────────────────────────── */
    #right {
      overflow: hidden;
      position: relative;
      background: #fff;
    }

    #svg-wrap {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: grab;
    }
    #svg-wrap:active { cursor: grabbing; }
    #svg-wrap svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── Zoom controls ───────────────────────────────────── */
    #zoom-controls {
      position: absolute;
      bottom: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .zoom-btn {
      width: 30px;
      height: 30px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 18px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      padding: 0;
    }
    .zoom-btn:hover { background: #f1f5f9; }

    #unit-hint {
      position: absolute;
      bottom: 16px;
      left: 16px;
      font-size: 11px;
      color: #94a3b8;
    }

    /* ── Panel toggle ────────────────────────────────────── */
    main {
      transition: grid-template-columns .2s ease;
    }
    main.panel-hidden {
      grid-template-columns: 0 1fr;
    }
    main.panel-hidden #left {
      opacity: 0;
      pointer-events: none;
    }
    #left {
      transition: opacity .15s ease;
    }
    #panel-toggle {
      background: none;
      border: none;
      color: #86efac;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      line-height: 0;
      display: flex;
      align-items: center;
    }
    #panel-toggle:hover { background: rgba(255,255,255,.15); }

    /* ── Mobile: ẩn panel trái mặc định ─────────────────── */
    @media (max-width: 600px) {
      main { grid-template-columns: 0 1fr; }
      #left { opacity: 0; pointer-events: none; }
      #panel-toggle-icon { display: none; }
    }
  </style>
</head>
<body>

<header>
  🏡 DrawPlan <span>v1 — Vẽ mặt bằng theo kích thước thực</span>
  <button id="panel-toggle" title="Ẩn/hiện panel"><svg width="20" height="16" viewBox="0 0 20 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="1" width="7" height="14" rx="2" fill="currentColor" opacity="0.45"/><path d="M7 1V15" stroke="currentColor" stroke-width="1.5"/><path d="M14 5.5L11 8L14 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  <a href="/help" target="_blank">? Hướng dẫn</a>
</header>

<main>
  <div id="left">
    <div class="panel-title">
      Mô tả mặt bằng (JSON)
    </div>
    <textarea id="input" spellcheck="false"></textarea>
    <div id="error-box"></div>
    <div id="toolbar">
      <button id="run">▶ Vẽ</button>
      <button id="copy-svg" data-label="Copy SVG">Copy SVG</button>
      <button id="export-html" data-label="Xuất HTML">Xuất HTML</button>
      <button id="measure" title="Đo khoảng cách (Esc để thoát)">📏 Đo</button>
    </div>
  </div>

  <div id="right">
    <div id="svg-wrap"></div>
    <div id="zoom-controls">
      <button class="zoom-btn" id="zoom-in">+</button>
      <button class="zoom-btn" id="zoom-reset">⊙</button>
      <button class="zoom-btn" id="zoom-out">−</button>
      <button class="zoom-btn" id="rotate-ccw" title="Xoay 90° ngược chiều kim đồng hồ"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="4" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M11 2.5 C13.5 2.5 14.5 4.5 14.5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/><polyline points="9,1 11,2.5 9.5,4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></button>
    </div>
    <div id="unit-hint"></div>
  </div>
</main>

<script>
// ── Compiler (ported from compiler.ts) ────────────────────────────────────────
function toMm(value, unit) {
  if (unit === "m")  return value * 1000;
  if (unit === "cm") return value * 10;
  return value; // mm
}

function resolveDimSides(spec) {
  const defaults = [
    { side: "top", labelPos: "outer" },
    { side: "right", labelPos: "outer" },
  ];
  if (spec === false) return [];
  if (spec === true || spec === undefined)
    return defaults.map(e => ({ ...e }));
  if (Array.isArray(spec))
    return spec.map(s => ({ side: s, labelPos: "outer" }));
  // Record form: merge vào default (top+right). false = ẩn, true/config = thêm/override
  const map = new Map(defaults.map(e => [e.side, { ...e }]));
  for (const [side, cfg] of Object.entries(spec)) {
    if (cfg === false) { map.delete(side); }
    else {
      map.set(side, {
        side,
        labelPos: (cfg === true || !cfg.labelPos) ? "outer" : cfg.labelPos,
      });
    }
  }
  return Array.from(map.values());
}

function compileRect(item, unit) {
  return {
    kind: "rect", id: item.id, label: item.label,
    x: toMm(item.x, unit), y: toMm(item.y, unit),
    w: toMm(item.width, unit), h: toMm(item.height, unit),
    stroke: item.stroke ?? "#1a7a3e",
    strokeWidth: item.strokeWidth != null ? toMm(item.strokeWidth, unit) : -1,
    strokeDash: item.style === "dashed" ? "8,5" : undefined,
    fill: item.fill ?? "none",
    labelRotation: item.labelRotation,
    dimSides: resolveDimSides(item.showDimensions),
  };
}

function compilePath(item, unit) {
  return {
    kind: "path", id: item.id, label: item.label,
    points: item.points.map(([x, y]) => [toMm(x, unit), toMm(y, unit)]),
    stroke: item.stroke ?? "#555",
    strokeDash: item.style === "dashed" ? "8,5" : undefined,
    strokeWidth: toMm(item.strokeWidth ?? 200, unit),
  };
}

function compileMeasure(item, unit) {
  const [x1,y1] = [toMm(item.from[0],unit), toMm(item.from[1],unit)];
  const [x2,y2] = [toMm(item.to[0],unit),   toMm(item.to[1],unit)];
  const dist = Math.round(Math.sqrt((x2-x1)**2+(y2-y1)**2));
  return {
    kind: "measure", id: item.id,
    from: [x1,y1], to: [x2,y2],
    label: item.label, autoLabel: String(dist),
    offset: item.offset ?? 0,
    stroke: item.stroke ?? "#888",
    labelPos: item.labelPos ?? "outer",
  };
}

function compile(doc) {
  const unit = doc.unit ?? "mm";
  const shapes = (doc.items ?? []).map(item => {
    if (item.type === "rect") return compileRect(item, unit);
    if (item.type === "path") return compilePath(item, unit);
    if (item.type === "measure") return compileMeasure(item, unit);
    throw new Error("Unknown type: " + item.type);
  });
  return {
    plotW: toMm(doc.plot.width, unit),
    plotH: toMm(doc.plot.depth, unit),
    plotLabel: doc.plot.label,
    plotShowDimensions: doc.plot.showDimensions !== false,
    shapes, unit,
    dimensionOffset: doc.dimensionOffset ?? 0,
  };
}

// ── Renderer (ported from renderer.ts) ────────────────────────────────────────
const CANVAS_W = 1400, CANVAS_H = 900, PADDING = 80;

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function fmtMm(mm, unit) {
  if (unit === "m")  return (mm / 1000).toLocaleString("en", { maximumFractionDigits: 3 });
  if (unit === "cm") return (mm / 10).toLocaleString("en", { maximumFractionDigits: 1 });
  return String(Math.round(mm));
}

function hDimLine(x1, x2, y, label, textBelow = false) {
  if (Math.abs(x2 - x1) < 1) return "";
  const mid = (x1 + x2) / 2;
  const ty = textBelow ? y + 14 : y - 6;
  return `<g class="dim-line">
    <line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#888" stroke-width="1" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
    <line x1="${x1}" y1="${y-8}" x2="${x1}" y2="${y+8}" stroke="#888" stroke-width="1"/>
    <line x1="${x2}" y1="${y-8}" x2="${x2}" y2="${y+8}" stroke="#888" stroke-width="1"/>
    <text x="${mid}" y="${ty}" text-anchor="middle" font-size="11" fill="#555" font-family="monospace">${esc(label)}</text>
  </g>`;
}

function vDimLine(y1, y2, x, label, textRight = false) {
  if (Math.abs(y2 - y1) < 1) return "";
  const mid = (y1 + y2) / 2;
  const tx = textRight ? x + 14 : x - 6;
  return `<g class="dim-line">
    <line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="#888" stroke-width="1" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
    <line x1="${x-8}" y1="${y1}" x2="${x+8}" y2="${y1}" stroke="#888" stroke-width="1"/>
    <line x1="${x-8}" y1="${y2}" x2="${x+8}" y2="${y2}" stroke="#888" stroke-width="1"/>
    <text x="${tx}" y="${mid}" text-anchor="middle" font-size="11" fill="#555" font-family="monospace" transform="rotate(-90,${tx},${mid})">${esc(label)}</text>
  </g>`;
}

function renderRectShape(r, scale, offX, offY, unit, dimOffset) {
  const cx = offX + r.x * scale, cy = offY + r.y * scale;
  const cw = r.w * scale, ch = r.h * scale;
  const sw = r.strokeWidth > 0 ? r.strokeWidth * scale : 1.5;
  const dash = r.strokeDash ? ` stroke-dasharray="${r.strokeDash}"` : "";
  let out = `<rect x="${cx}" y="${cy}" width="${cw}" height="${ch}" stroke="${esc(r.stroke)}" stroke-width="${sw}" fill="${esc(r.fill)}"${dash}/>`;
  if (r.label) {
    const lx = cx+cw/2, ly = cy+ch/2;
    const autoRot = r.labelRotation !== undefined ? r.labelRotation : (ch > cw ? 90 : 0);
    const rot = autoRot !== 0 ? ` transform="rotate(${autoRot},${lx},${ly})"` : "";
    out += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#1a3a2a" font-family="sans-serif"${rot}>${esc(r.label)}</text>`;
  }
  if (r.dimSides.length > 0) {
    const wLabel = fmtMm(r.w, unit), hLabel = fmtMm(r.h, unit);
    for (const { side, labelPos } of r.dimSides) {
      const outer = labelPos === "outer";
      if (side === "top")    out += hDimLine(cx, cx+cw, cy-dimOffset, wLabel, !outer);
      if (side === "bottom") out += hDimLine(cx, cx+cw, cy+ch+dimOffset, wLabel, outer);
      if (side === "right")  out += vDimLine(cy, cy+ch, cx+cw+dimOffset, hLabel, outer);
      if (side === "left")   out += vDimLine(cy, cy+ch, cx-dimOffset, hLabel, !outer);
    }
  }
  return `<g data-id="${esc(r.id)}" class="plan-item">${out}</g>`;
}

function renderMeasure(m, scale, offX, offY) {
  const x1=offX+m.from[0]*scale, y1=offY+m.from[1]*scale;
  const x2=offX+m.to[0]*scale,   y2=offY+m.to[1]*scale;
  const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy);
  if (len<1) return "";
  const nx=-dy/len, ny=dx/len;
  const ox=nx*m.offset, oy=ny*m.offset;
  const ax=x1+ox, ay=y1+oy, bx=x2+ox, by=y2+oy;
  const mx2=(ax+bx)/2, my2=(ay+by)/2;
  const label = m.label ?? m.autoLabel;
  const angle = Math.atan2(dy,dx)*180/Math.PI;
  const ta = (angle>90||angle<-90) ? angle+180 : angle;
  const labelDy = m.labelPos === "inner" ? "12" : "-5";
  const tl=6;
  return `<g data-id="${esc(m.id)}" class="measure-item">
    <line x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}" stroke="${esc(m.stroke)}" stroke-width="1" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
    <line x1="${ax-nx*tl}" y1="${ay-ny*tl}" x2="${ax+nx*tl}" y2="${ay+ny*tl}" stroke="${esc(m.stroke)}" stroke-width="1"/>
    <line x1="${bx-nx*tl}" y1="${by-ny*tl}" x2="${bx+nx*tl}" y2="${by+ny*tl}" stroke="${esc(m.stroke)}" stroke-width="1"/>
    <text x="${mx2}" y="${my2}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="${esc(m.stroke)}" font-family="monospace" transform="rotate(${ta},${mx2},${my2})" dy="${labelDy}">${esc(label)}</text>
  </g>`;
}

function renderShape(shape, scale, offX, offY, unit, dimOffset) {
  if (shape.kind === "rect") return renderRectShape(shape, scale, offX, offY, unit, dimOffset);
  if (shape.kind === "path") {
    const pts = shape.points.map(([x,y]) => `${offX+x*scale},${offY+y*scale}`).join(" ");
    const dash = shape.strokeDash ? ` stroke-dasharray="${shape.strokeDash}"` : "";
    return `<polyline points="${pts}" stroke="${esc(shape.stroke)}" stroke-width="${shape.strokeWidth*scale}" fill="none"${dash}/>`;
  }
  if (shape.kind === "measure") return renderMeasure(shape, scale, offX, offY);
  return "";
}

const DEFS = `<defs>
  <marker id="arrow-start" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M6,0 L0,3 L6,6" fill="none" stroke="#888" stroke-width="1"/>
  </marker>
  <marker id="arrow-end" markerWidth="6" markerHeight="6" refX="0" refY="3" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L6,3 L0,6" fill="none" stroke="#888" stroke-width="1"/>
  </marker>
</defs>`;

function renderSvg(scene) {
  const dimOffset = scene.dimensionOffset;
  const extra = dimOffset * 2 + PADDING;
  const scale = Math.min((CANVAS_W - extra*2) / scene.plotW, (CANVAS_H - extra*2) / scene.plotH);
  const totalW = scene.plotW * scale, totalH = scene.plotH * scale;
  const offX = (CANVAS_W - totalW) / 2, offY = (CANVAS_H - totalH) / 2;

  let body = `<rect x="${offX}" y="${offY}" width="${totalW}" height="${totalH}" stroke="#333" stroke-width="1.5" fill="none"/>`;
  if (scene.plotShowDimensions) {
    body += hDimLine(offX, offX+totalW, offY-dimOffset, fmtMm(scene.plotW, scene.unit));
    body += vDimLine(offY, offY+totalH, offX-dimOffset, fmtMm(scene.plotH, scene.unit));
  }
  if (scene.plotLabel) body += `<text x="${offX+totalW/2}" y="${offY+totalH+20}" text-anchor="middle" font-size="12" fill="#666" font-family="sans-serif">${esc(scene.plotLabel)}</text>`;
  for (const shape of scene.shapes) body += renderShape(shape, scale, offX, offY, scene.unit, dimOffset);

  // ── Compass labels ────────────────────────────────────────────────────────
  const compassGap = dimOffset + 36;
  const cs = `font-size="13" fill="#888" font-family="sans-serif" font-weight="600" letter-spacing="1"`;
  const midX = offX + totalW/2, midY = offY + totalH/2;
  body += `<text x="${midX}" y="${offY - compassGap}" text-anchor="middle" dominant-baseline="auto" ${cs}>N</text>`;
  body += `<text x="${midX}" y="${offY + totalH + compassGap}" text-anchor="middle" dominant-baseline="hanging" ${cs}>S</text>`;
  body += `<text x="${offX - compassGap}" y="${midY}" text-anchor="end" dominant-baseline="middle" ${cs}>W</text>`;
  body += `<text x="${offX + totalW + compassGap}" y="${midY}" text-anchor="start" dominant-baseline="middle" ${cs}>E</text>`;

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${CANVAS_W}" height="${CANVAS_H}" viewBox="0 0 ${CANVAS_W} ${CANVAS_H}">${DEFS}${body}</svg>`;
}


// app.js — DrawPlan UI
// Render qua server API nếu có, fallback sang local engine nếu mở file trực tiếp

const input      = document.getElementById("input");
const runBtn     = document.getElementById("run");
const svgWrap    = document.getElementById("svg-wrap");
const errorBox   = document.getElementById("error-box");
const copySvg    = document.getElementById("copy-svg");
const exportHtml = document.getElementById("export-html");
const measureBtn = document.getElementById("measure");
const unitHint   = document.getElementById("unit-hint");
const zoomIn   = document.getElementById("zoom-in");
const zoomOut  = document.getElementById("zoom-out");
const zoomReset= document.getElementById("zoom-reset");
const rotateCcw= document.getElementById("rotate-ccw");

// ── Measure tool state ────────────────────────────────────────────────────────
let measureMode = false;
let measurePt1  = null;   // { mmX, mmY, svgX, svgY }
let currentDoc  = null;   // last successfully parsed & rendered doc

function getDocMapping(doc) {
  const CW = 1400, CH = 900, PAD = 80;
  const unit = doc.unit ?? "mm";
  const toMm = v => unit === "m" ? v * 1000 : unit === "cm" ? v * 10 : v;
  const plotW = toMm(doc.plot.width);
  const plotH = toMm(doc.plot.depth);
  const extra = (doc.dimensionOffset ?? 0) * 2 + PAD;
  const scale = Math.min((CW - extra * 2) / plotW, (CH - extra * 2) / plotH);
  const offX  = (CW - plotW * scale) / 2;
  const offY  = (CH - plotH * scale) / 2;
  return { scale, offX, offY, unit };
}

function screenToDoc(clientX, clientY) {
  const svg = getSvg();
  if (!svg || !viewBox || !currentDoc) return null;
  const rect = svg.getBoundingClientRect();
  const svgX = viewBox.x + (clientX - rect.left) / rect.width  * viewBox.w;
  const svgY = viewBox.y + (clientY - rect.top)  / rect.height * viewBox.h;
  const m    = getDocMapping(currentDoc);
  return { mmX: (svgX - m.offX) / m.scale, mmY: (svgY - m.offY) / m.scale, svgX, svgY };
}

function fmtDist(mm, unit) {
  if (unit === "m")  return `${(mm / 1000).toFixed(3)} m`;
  if (unit === "cm") return `${(mm / 10).toFixed(1)} cm`;
  return `${Math.round(mm)} mm`;
}

function getMeasureOverlay() {
  const svg = getSvg(); if (!svg) return null;
  let g = svg.querySelector("#measure-overlay");
  if (!g) {
    g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.setAttribute("id", "measure-overlay");
    g.style.pointerEvents = "none";
    svg.appendChild(g);
  }
  return g;
}

function clearMeasureOverlay() {
  const g = getSvg()?.querySelector("#measure-overlay");
  if (g) g.innerHTML = "";
  measurePt1 = null;
}

function drawMeasureOverlay(pt1, pt2, label) {
  const g = getMeasureOverlay(); if (!g) return;
  const dot = (cx, cy) =>
    `<circle cx="${cx}" cy="${cy}" r="5" fill="#f59e0b" stroke="#fff" stroke-width="1.5"/>`;
  const midX = (pt1.svgX + pt2.svgX) / 2;
  const midY = (pt1.svgY + pt2.svgY) / 2;
  const labelW = label ? Math.max(60, label.length * 7 + 16) : 0;
  g.innerHTML =
    dot(pt1.svgX, pt1.svgY) +
    `<line x1="${pt1.svgX}" y1="${pt1.svgY}" x2="${pt2.svgX}" y2="${pt2.svgY}"
       stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>` +
    dot(pt2.svgX, pt2.svgY) +
    (label
      ? `<rect x="${midX - labelW/2}" y="${midY - 13}" width="${labelW}" height="18"
           rx="3" fill="rgba(0,0,0,.72)"/>
         <text x="${midX}" y="${midY + 2}" text-anchor="middle" font-size="11"
           fill="#fff" font-family="monospace">${label}</text>`
      : "");
}

function setMeasureMode(on) {
  measureMode = on;
  if (on) {
    measureBtn.classList.add("active");
    svgWrap.style.cursor = "crosshair";
    errorBox.textContent = "📏 Click điểm thứ nhất để bắt đầu đo...";
  } else {
    measureBtn.classList.remove("active");
    svgWrap.style.cursor = "";
    errorBox.textContent = "";
    clearMeasureOverlay();
  }
}

measureBtn.addEventListener("click", () => setMeasureMode(!measureMode));

document.addEventListener("keydown", e => {

// ── Pan/zoom state ─────────────────────────────────────────────────────────────
let viewBox = null; // { x, y, w, h }
let lastSvgW = 1400, lastSvgH = 900;

function getSvg() { return svgWrap.querySelector("svg"); }

function applyViewBox(vb) {
  const svg = getSvg();
  if (!svg) return;
  svg.setAttribute("viewBox", `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  viewBox = vb;
}

function resetView() {
  applyViewBox({ x: 0, y: 0, w: lastSvgW, h: lastSvgH });
}

// Wheel zoom
svgWrap.addEventListener("wheel", (e) => {
  e.preventDefault();
  const svg = getSvg();
  if (!svg || !viewBox) return;

  const rect = svg.getBoundingClientRect();
  const mx   = (e.clientX - rect.left) / rect.width;
  const my   = (e.clientY - rect.top)  / rect.height;

  const factor = e.deltaY > 0 ? 1.1 : 0.9;
  const nw = viewBox.w * factor;
  const nh = viewBox.h * factor;
  const nx = viewBox.x + (viewBox.w - nw) * mx;
  const ny = viewBox.y + (viewBox.h - nh) * my;

  applyViewBox({ x: nx, y: ny, w: nw, h: nh });
}, { passive: false });

// Pan drag
let panStart = null;
svgWrap.addEventListener("pointerdown", (e) => {
  if (e.button !== 0) return;
  if (measureMode) return;   // measure mode handles clicks separately
  panStart = { clientX: e.clientX, clientY: e.clientY, vb: { ...viewBox } };
  svgWrap.setPointerCapture(e.pointerId);
});
svgWrap.addEventListener("pointermove", (e) => {
  // rubber-band line in measure mode
  if (measureMode && measurePt1) {
    const pt = screenToDoc(e.clientX, e.clientY);
    if (pt) drawMeasureOverlay(measurePt1, pt, null);
    return;
  }
  if (!panStart || !viewBox) return;
  const svg = getSvg();
  if (!svg) return;
  const rect = svg.getBoundingClientRect();
  const dx = -(e.clientX - panStart.clientX) / rect.width  * panStart.vb.w;
  const dy = -(e.clientY - panStart.clientY) / rect.height * panStart.vb.h;
  applyViewBox({ ...panStart.vb, x: panStart.vb.x + dx, y: panStart.vb.y + dy });
});
svgWrap.addEventListener("pointerup", () => { panStart = null; });

// Measure clicks (on the svg-wrap, not the SVG element, so coordinates are consistent)
svgWrap.addEventListener("click", (e) => {
  if (!measureMode) return;
  const pt = screenToDoc(e.clientX, e.clientY);
  if (!pt) return;
  if (!measurePt1) {
    clearMeasureOverlay();
    measurePt1 = pt;
    drawMeasureOverlay(pt, pt, null);
    errorBox.textContent = "📏 Click điểm thứ hai...";
  } else {
    const dx   = pt.mmX - measurePt1.mmX;
    const dy   = pt.mmY - measurePt1.mmY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const unit = getDocMapping(currentDoc).unit;
    const label = fmtDist(dist, unit);
    drawMeasureOverlay(measurePt1, pt, label);
    errorBox.textContent = `📏 Khoảng cách: ${label} — Click tiếp để đo lại, Esc để thoát`;
    measurePt1 = null;
  }
});

// Zoom buttons
zoomIn.addEventListener("click", () => {
  if (!viewBox) return;
  const cx = viewBox.x + viewBox.w / 2, cy = viewBox.y + viewBox.h / 2;
  const nw = viewBox.w * 0.8, nh = viewBox.h * 0.8;
  applyViewBox({ x: cx - nw / 2, y: cy - nh / 2, w: nw, h: nh });
});
zoomOut.addEventListener("click", () => {
  if (!viewBox) return;
  const cx = viewBox.x + viewBox.w / 2, cy = viewBox.y + viewBox.h / 2;
  const nw = viewBox.w * 1.25, nh = viewBox.h * 1.25;
  applyViewBox({ x: cx - nw / 2, y: cy - nh / 2, w: nw, h: nh });
});
zoomReset.addEventListener("click", resetView);

// ── Rotate CCW ────────────────────────────────────────────────────────────────
let svgRotation = 0;

function wrapSvgContent() {
  const svg = getSvg();
  if (!svg) return;
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.id = "rotation-group";
  while (svg.firstChild) g.appendChild(svg.firstChild);
  svg.appendChild(g);
}

function applySvgRotation() {
  const svg = getSvg();
  if (!svg) return;
  const g = svg.querySelector("#rotation-group");
  if (!g) return;
  const cx = lastSvgW / 2, cy = lastSvgH / 2;
  g.setAttribute("transform", `rotate(${svgRotation}, ${cx}, ${cy})`);
}

rotateCcw.addEventListener("click", () => {
  svgRotation = (svgRotation - 90 + 360) % 360;
  applySvgRotation();
});

// ── Render ─────────────────────────────────────────────────────────────────────
function renderLocal(doc) {
  // Dùng compile/renderSvg từ engine-core.js (nếu có) hoặc engine.js
  if (typeof compile === "undefined" || typeof renderSvg === "undefined") {
    throw new Error("Engine chưa được load — mở qua server hoặc dùng index.html standalone");
  }
  const scene = compile(doc);
  return renderSvg(scene);
}

runBtn.addEventListener("click", async () => {
  errorBox.textContent = "";

  let doc;
  try {
    doc = JSON.parse(input.value);
  } catch (e) {
    errorBox.textContent = "Lỗi JSON: " + e.message;
    return;
  }

  let svgStr;
  try {
    const resp = await fetch("/api/render", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(doc),
    });
    const data = await resp.json();
    if (data.error) { errorBox.textContent = "Lỗi: " + data.error; return; }
    svgStr = data.svg;
  } catch {
    // Không có server — render local
    try { svgStr = renderLocal(doc); } catch (err) { errorBox.textContent = String(err); return; }
  }

  svgWrap.innerHTML = svgStr;
  currentDoc = doc;
  svgRotation = 0;
  wrapSvgContent();
  clearMeasureOverlay();

  const svg = getSvg();
  if (svg) {
    lastSvgW = parseFloat(svg.getAttribute("width")  ?? "1400");
    lastSvgH = parseFloat(svg.getAttribute("height") ?? "900");
    viewBox   = { x: 0, y: 0, w: lastSvgW, h: lastSvgH };
  }
  unitHint.textContent = `Đơn vị: ${doc.unit ?? "mm"}`;
});

// Copy SVG
copySvg.addEventListener("click", () => {
  const svg = getSvg();
  if (!svg) return;
  navigator.clipboard.writeText(svg.outerHTML).then(() => {
    copySvg.textContent = "Đã copy!";
    copySvg.classList.add("copied");
    setTimeout(() => {
      copySvg.textContent = copySvg.dataset.label;
      copySvg.classList.remove("copied");
    }, 1500);
  });
});

exportHtml.addEventListener("click", () => {

  // Lấy tên từ label của plot trong JSON (nếu có)
  let title = "DrawPlan";
  try {
    const doc = JSON.parse(input.value);
    if (doc?.plot?.label) title = doc.plot.label;
  } catch {}

  const svgStr = svg.outerHTML;
  const html = `<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />

  <title>${title}</title>
  <style>
    body { margin: 0; background: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    svg { max-width: 100%; height: auto; display: block; cursor: grab; }
    svg:active { cursor: grabbing; }
  </style>
</head>
<body>
${svgStr}
<script>
  // Pan & zoom cho file xuất ra
  const svg = document.querySelector("svg");
  let vb = { x: 0, y: 0, w: parseFloat(svg.getAttribute("width") || 1400), h: parseFloat(svg.getAttribute("height") || 900) };
  function applyVb() { svg.setAttribute("viewBox", vb.x+" "+vb.y+" "+vb.w+" "+vb.h); }
  svg.addEventListener("wheel", e => {
    e.preventDefault();
    const r = svg.getBoundingClientRect();
    const mx = (e.clientX - r.left) / r.width, my = (e.clientY - r.top) / r.height;
    const f = e.deltaY > 0 ? 1.1 : 0.9;
    const nw = vb.w * f, nh = vb.h * f;
    vb = { x: vb.x + (vb.w - nw) * mx, y: vb.y + (vb.h - nh) * my, w: nw, h: nh };
    applyVb();
  }, { passive: false });
  let pan = null;
  svg.addEventListener("pointerdown", e => { pan = { cx: e.clientX, cy: e.clientY, vb: {...vb} }; svg.setPointerCapture(e.pointerId); });
  svg.addEventListener("pointermove", e => {
    if (!pan) return;
    const r = svg.getBoundingClientRect();
    vb = { ...pan.vb, x: pan.vb.x - (e.clientX - pan.cx) / r.width * pan.vb.w, y: pan.vb.y - (e.clientY - pan.cy) / r.height * pan.vb.h };
    applyVb();
  });
  svg.addEventListener("pointerup", () => pan = null);
<\/script>
</body>
</html>`;

  const blob = new Blob([html], { type: "text/html" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = title.replace(/\s+/g, "_") + ".html";
  a.click();
  URL.revokeObjectURL(url);

  exportHtml.textContent = "Đã xuất!";
  exportHtml.classList.add("done");
  setTimeout(() => {
    exportHtml.textContent = exportHtml.dataset.label;
    exportHtml.classList.remove("done");
  }, 1500);
});
